name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    # All app code lives under ./app — see docs/build_plan.md §4.
    working-directory: app

jobs:
  verify:
    name: Lint, typecheck, build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Build needs DATABASE_URL etc. to be present (env.ts validates them).
    # In CI we use placeholder values; we never connect to a real DB here.
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      NEXTAUTH_SECRET: ci-placeholder-secret-not-used
      GOOGLE_CLIENT_ID: ci-placeholder
      GOOGLE_CLIENT_SECRET: ci-placeholder
      ANTHROPIC_API_KEY: ci-placeholder

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
